<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B84B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9943A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f2347" flood-opacity="0.3"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="120" height="160" rx="0"/>
    </clipPath>
  </defs>

  <!-- Icon mark — left side -->
  <!-- Outer circle background -->
  <circle cx="76" cy="80" r="58" fill="url(#navyGrad)" filter="url(#softShadow)"/>
  <!-- Glass overlay ring -->
  <circle cx="76" cy="80" r="58" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Inner glass panel -->
  <rect x="44" y="48" width="64" height="72" rx="10" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Building outline icon -->
  <rect x="54" y="68" width="18" height="52" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="76" y="58" width="22" height="62" rx="2" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>

  <!-- AI scan lines -->
  <line x1="46" y1="88" x2="106" y2="88" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.9"/>
  <line x1="46" y1="96" x2="106" y2="96" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>

  <!-- Gold accent dot top-right -->
  <circle cx="113" cy="47" r="7" fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- Tick mark inside dot -->
  <polyline points="109.5,47 112,50 117,44" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <!-- "Survey" -->
  <text x="152" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="url(#navyGrad)" letter-spacing="-1">Survey</text>
  <!-- "AI" in gold -->
  <text x="355" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="url(#goldGrad)" letter-spacing="-1" filter="url(#glow)">AI</text>

  <!-- Tagline -->
  <text x="153" y="118" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="13" font-weight="400" fill="#4A5578" letter-spacing="3.5">PROPERTY INTELLIGENCE</text>

  <!-- Thin gold underline under wordmark -->
  <rect x="152" y="103" width="222" height="2" rx="1" fill="url(#goldGrad)" opacity="0.6"/>
</svg>